name: Build Windows Exe (Safe Mode)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    # We use 'cmd' to make file moving commands reliable
    defaults:
      run:
        shell: cmd

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install customtkinter yt-dlp pyinstaller certifi packaging mutagen pillow

    - name: Download and Setup FFmpeg
      run: |
        echo Downloading FFmpeg...
        curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
        
        echo Extracting...
        7z x ffmpeg.zip
        
        echo Moving ffmpeg.exe to root folder...
        move ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe .
        
        echo Cleaning up zip...
        del ffmpeg.zip
        
        echo === DEBUG: LIST FILES ===
        dir

    - name: Build with PyInstaller (No Icon)
      # I removed --icon to prevent crashes. 
      # I also removed --windowed temporarily so you can see errors if it crashes on launch.
      run: |
        python -m PyInstaller --clean --onefile ^
        --name "YT Downloader" ^
        --add-binary "ffmpeg.exe;." ^
        --collect-all customtkinter ^
        --collect-all yt_dlp ^
        --collect-all certifi ^
        --hidden-import=PIL ^
        --hidden-import=packaging ^
        --hidden-import=mutagen ^
        yt_downloader.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YT-Downloader-Windows
        path: dist/YT Downloader.exe
